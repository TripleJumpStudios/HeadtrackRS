# Cross-compilation configuration for the headtrack-npclient and headtrack-winebridge
# Windows crates (built with --target x86_64-pc-windows-gnu).
#
# These crates are NOT in the workspace members and must be built explicitly:
#   cargo build -p headtrack-npclient --target x86_64-pc-windows-gnu --release
#   cargo build -p headtrack-winebridge --target x86_64-pc-windows-gnu --release
#
# Requires: sudo dnf install mingw64-gcc

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"
rustflags = ["-C", "target-feature=+crt-static"]
